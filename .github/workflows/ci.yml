name: CI

on: [ push, pull_request, workflow_dispatch ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build the Importer image
      run: docker build . --file ./Horscht.Importer/Dockerfile --tag horscht-importer:latest

    - name: Build the Web image
      run: docker build . --file ./Horscht.Web/Dockerfile --tag horscht-web:latest

  validateBicep:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Install Bicep CLI
      run: |
        curl -fLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
        chmod +x bicep
        sudo mv bicep /usr/local/bin/bicep

    - name: Validate Bicep modules
      working-directory: deployment
      run: bicep build main.bicep
