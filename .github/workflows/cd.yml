name: CD

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      aiModelName:
        description: 'Azure OpenAI model name (e.g. gpt-4o)'
        required: false
        default: ''
      aiModelVersion:
        description: 'Azure OpenAI model version (e.g. 2024-11-20)'
        required: false
        default: ''
      aiModelDeploymentName:
        description: 'Azure OpenAI model deployment name'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  AI_MODEL_NAME: ${{ vars.AI_MODEL_NAME || inputs.aiModelName || 'gpt-4o' }}
  AI_MODEL_VERSION: ${{ vars.AI_MODEL_VERSION || inputs.aiModelVersion || '2024-11-20' }}
  AI_MODEL_DEPLOYMENT_NAME: ${{ vars.AI_MODEL_DEPLOYMENT_NAME || inputs.aiModelDeploymentName || 'gpt-4o' }}

jobs:

  buildAndPush:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to the Container registry
      uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create image tag
      id: imageTag
      run: |
        branch=${{ github.ref_name }}
        echo "tag=${branch//'/'/'-'}-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

    - name: Extract metadata (tags, labels) for Docker
      id: metaWeb
      uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
      with:
        images: ${{ env.REGISTRY }}/thomasneuberger/horscht-web
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=${{ steps.imageTag.outputs.tag }}

      # https://github.com/docker/build-push-action#inputs
    - name: Build and push Docker image
      uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
      with:
        context: .
        file: ./Horscht.Web/Dockerfile
        push: true
        tags: ${{ steps.metaWeb.outputs.tags }}
        labels: ${{ steps.metaWeb.outputs.labels }}

    - name: Extract metadata (tags, labels) for Docker
      id: metaImporter
      uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
      with:
        images: ${{ env.REGISTRY }}/thomasneuberger/horscht-import
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=${{ steps.imageTag.outputs.tag }}

      # https://github.com/docker/build-push-action#inputs
    - name: Build and push Docker image
      uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
      with:
        context: .
        file: ./Horscht.Importer/Dockerfile
        push: true
        tags: ${{ steps.metaImporter.outputs.tags }}
        labels: ${{ steps.metaImporter.outputs.labels }}